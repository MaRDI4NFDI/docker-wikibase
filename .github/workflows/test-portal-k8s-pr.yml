name: Test portal-k8s PR creation

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Dummy message to write into portal-k8s"
        required: false
        default: "Testing PR creation from docker-wikibase"

permissions:
  contents: read

jobs:
  create-test-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout portal-k8s
        uses: actions/checkout@v6
        with:
          repository: MaRDI4NFDI/portal-k8s
          token: ${{ secrets.PORTAL_K8S_PAT }}
          path: portal-k8s

      - name: Make dummy change
        working-directory: portal-k8s
        run: |
          mkdir -p .github/pr-tests
          {
            echo "# docker-wikibase PR test"
            echo
            echo "Message: ${{ github.event.inputs.message }}"
            echo "Triggered by: ${{ github.repository }}"
            echo "Run ID: ${{ github.run_id }}"
            echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > .github/pr-tests/docker-wikibase-pr-test.md

      - name: Create pull request in portal-k8s
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PORTAL_K8S_PAT }}
          path: portal-k8s
          branch: test/docker-wikibase-pr-creation
          delete-branch: true
          title: "Test PR creation from docker-wikibase"
          commit-message: "Test PR creation from docker-wikibase"
          body: |
            This is a dummy PR created from `MaRDI4NFDI/docker-wikibase`.

            It tests whether `PORTAL_K8S_PAT` can:
            - checkout `MaRDI4NFDI/portal-k8s`
            - push a branch
            - create a pull request

            Safe to close after testing.

      - name: Add PR link to summary
        if: ${{ steps.cpr.outputs.pull-request-url != '' }}
        run: |
          echo "Created PR: ${{ steps.cpr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"