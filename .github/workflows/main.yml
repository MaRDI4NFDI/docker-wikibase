name: Build and push images to registry

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Force a rebuild of the Docker images without using cache.'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PUSH_IMAGE: ${{ github.event_name != 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      single-tag: ${{ steps.single-tag.outputs.single-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata wikibase
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/wikibase
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=Mediawiki/Wikibase image for the MaRDI portal
            org.opencontainers.image.title=Wikibase image
          annotations: |
            org.opencontainers.image.description=Mediawiki/Wikibase image for the MaRDI portal
            org.opencontainers.image.title=Wikibase image

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push wikibase image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: ${{ env.PUSH_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          cache-from: type=gha,scope=wikibase-shared
          cache-to: type=gha,mode=max,scope=wikibase-shared

      - name: Set single tag output
        id: single-tag
        run: |
          echo "single-tag=ghcr.io/mardi4nfdi/wikibase:latest" >> $GITHUB_OUTPUT


  build-apache:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      single-tag: ${{ steps.single-tag.outputs.single-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/apache
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=Apache reverse proxy for Mediawiki/Wikibase
            org.opencontainers.image.title=Apache Proxy
          annotations: |
            org.opencontainers.image.description=Apache reverse proxy for Mediawiki/Wikibase
            org.opencontainers.image.title=Apache Proxy

      - name: Set single tag output
        id: single-tag
        run: |
          echo "single-tag=${{ fromJSON(steps.meta.outputs.json).tags[0] }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push Apache image
        uses: docker/build-push-action@v7.2.0
        with:
          context: apache
          push: ${{ env.PUSH_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          cache-from: type=gha,scope=wikibase-shared
          cache-to: type=gha,mode=max,scope=wikibase-shared

  build-apache-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs:
     - build-apache
     - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/apache-assets
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=Apache reverse proxy for Mediawiki/Wikibase with static assets
            org.opencontainers.image.title=Apache Proxy (assets)
          annotations: |
            org.opencontainers.image.description=Apache reverse proxy for Mediawiki/Wikibase with static assets
            org.opencontainers.image.title=Apache Proxy (assets)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push Apache assets image
        uses: docker/build-push-action@v7.2.0
        with:
          context: apache_assets
          push: ${{ env.PUSH_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          cache-from: type=gha,scope=wikibase-shared
          cache-to: type=gha,mode=max,scope=wikibase-shared
          build-args: |
            APACHE_IMAGE=${{ needs.build-apache.outputs.single-tag }}
            WB_IMAGE=${{ needs.build.outputs.single-tag }}

  build-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for dev
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/wikibase-dev
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Wikibase Development
            org.opencontainers.image.description=Wikibase development environment with additional tools

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push Docker dev image
        uses: docker/build-push-action@v7.2.0
        with:
          context: dev
          push: ${{ env.PUSH_IMAGE }}
          tags: ${{ env.REGISTRY }}/mardi4nfdi/wikibase-dev:latest
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          build-args: |
            BASE_IMAGE=${{ needs.build.outputs.single-tag }}
          cache-from: type=gha,scope=wikibase-shared
          cache-to: type=gha,mode=max,scope=wikibase-shared
