name: Build and push images to registry

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Force a rebuild of the Docker images without using cache.'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PUSH_IMAGE: ${{ github.event_name != 'pull_request' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate portal-k8s GitHub App token
        if: env.PUSH_IMAGE == 'true'
        id: portal-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PORTAL_K8S_APP_ID }}
          private-key: ${{ secrets.PORTAL_K8S_APP_PRIVATE_KEY }}
          owner: MaRDI4NFDI
          repositories: portal-k8s

      - name: Log in to the Container registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Global SemVer Metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/wikibase
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set image tags
        if: env.PUSH_IMAGE == 'true'
        id: image-tags
        run: |
          echo "staging=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "release=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Check whether commit images already exist
        if: env.PUSH_IMAGE == 'true' && startsWith(github.ref, 'refs/tags/v')
        id: commit-images
        run: |
          SOURCE_TAG="${{ steps.image-tags.outputs.staging }}"

          if docker buildx imagetools inspect ghcr.io/mardi4nfdi/wikibase:${SOURCE_TAG} >/dev/null 2>&1 \
            && docker buildx imagetools inspect ghcr.io/mardi4nfdi/apache-assets:${SOURCE_TAG} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push All Images via Bake
        if: |
          github.event_name == 'pull_request' ||
          github.ref == 'refs/heads/main' ||
          (env.PUSH_IMAGE == 'true' && startsWith(github.ref, 'refs/tags/v') && steps.commit-images.outputs.exists == 'false')
        uses: docker/bake-action@v7.2.0
        with:
          files: docker-bake.hcl
          push: ${{ env.PUSH_IMAGE }}
          load: ${{ env.PUSH_IMAGE == 'false' }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          set: |
            *.cache-from=type=gha,scope=wikibase-shared
            *.cache-to=type=gha,mode=max,scope=wikibase-shared
        env:
          B_TAGS: ${{ steps.meta.outputs.json }}

      - name: Promote commit images for production
        if: env.PUSH_IMAGE == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          SOURCE_TAG="${{ steps.image-tags.outputs.staging }}"
          RELEASE_TAG="${{ steps.image-tags.outputs.release }}"

          docker buildx imagetools create \
            --tag ghcr.io/mardi4nfdi/wikibase:${RELEASE_TAG} \
            ghcr.io/mardi4nfdi/wikibase:${SOURCE_TAG}

          docker buildx imagetools create \
            --tag ghcr.io/mardi4nfdi/apache-assets:${RELEASE_TAG} \
            ghcr.io/mardi4nfdi/apache-assets:${SOURCE_TAG}

      - name: Checkout portal-k8s
        if: env.PUSH_IMAGE == 'true'
        uses: actions/checkout@v7
        with:
          repository: MaRDI4NFDI/portal-k8s
          token: ${{ steps.portal-app-token.outputs.token }}
          path: portal-k8s

      - name: Update staging values
        if: env.PUSH_IMAGE == 'true' && github.ref == 'refs/heads/main'
        working-directory: portal-k8s
        run: |
          yq -i \
            '.spec.values.mediawiki.image.tag = "${{ steps.image-tags.outputs.staging }}"' \
            apps/staging/wikibase/values-staging.yaml

      - name: Update production values
        if: env.PUSH_IMAGE == 'true' && startsWith(github.ref, 'refs/tags/v')
        working-directory: portal-k8s
        run: |
          yq -i \
            '.spec.values.mediawiki.image.tag = "${{ steps.image-tags.outputs.release }}"' \
            apps/production/wikibase/values-production.yaml

      - name: Create staging PR
        if: env.PUSH_IMAGE == 'true' && github.ref == 'refs/heads/main'
        id: cpr-staging
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.portal-app-token.outputs.token }}
          path: portal-k8s
          branch: update/wikibase-staging
          delete-branch: true
          sign-commits: true
          title: "Update staging Wikibase image to ${{ steps.image-tags.outputs.staging }}"
          commit-message: "Update staging Wikibase image to ${{ steps.image-tags.outputs.staging }}"
          body: |
            @coderabbitai ignore

            This PR is automatically generated by the [docker-wikibase release workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Please do not modify this PR description.

            ## Deployment information

            - Environment: **staging**
            - Source commit: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - Image tag: `${{ steps.image-tags.outputs.staging }}`

            ## Images

            - [wikibase package](https://github.com/MaRDI4NFDI/docker-wikibase/pkgs/container/wikibase): `ghcr.io/mardi4nfdi/wikibase:${{ steps.image-tags.outputs.staging }}`
            - [apache-assets package](https://github.com/MaRDI4NFDI/docker-wikibase/pkgs/container/apache-assets): `ghcr.io/mardi4nfdi/apache-assets:${{ steps.image-tags.outputs.staging }}`

      - name: Create production PR
        if: env.PUSH_IMAGE == 'true' && startsWith(github.ref, 'refs/tags/v')
        id: cpr-production
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.portal-app-token.outputs.token }}
          path: portal-k8s
          branch: update/wikibase-production
          delete-branch: true
          sign-commits: true
          title: "Update production Wikibase image to ${{ steps.image-tags.outputs.release }}"
          commit-message: "Update production Wikibase image to ${{ steps.image-tags.outputs.release }}"
          body: |
            @coderabbitai ignore

            This PR is automatically generated by the [docker-wikibase release workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Please do not modify this PR description.

            ## Deployment information

            - Environment: **production**
            - Git tag: [`${{ github.ref_name }}`](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
            - Image tag: `${{ steps.image-tags.outputs.release }}`
            - Source commit: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ## Images

            - [wikibase package](https://github.com/MaRDI4NFDI/docker-wikibase/pkgs/container/wikibase): `ghcr.io/mardi4nfdi/wikibase:${{ steps.image-tags.outputs.release }}`
            - [apache-assets package](https://github.com/MaRDI4NFDI/docker-wikibase/pkgs/container/apache-assets): `ghcr.io/mardi4nfdi/apache-assets:${{ steps.image-tags.outputs.release }}`

      - name: Add portal-k8s PR links to summary
        if: always()
        run: |
          if [ -n "${{ steps.cpr-staging.outputs.pull-request-url }}" ]; then
            echo "Staging PR: ${{ steps.cpr-staging.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "${{ steps.cpr-production.outputs.pull-request-url }}" ]; then
            echo "Production PR: ${{ steps.cpr-production.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          fi