name: Build and push images to registry

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Force a rebuild of the Docker images without using cache.'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PUSH_IMAGE: ${{ github.event_name != 'pull_request' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to the Container registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Global SemVer Metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/wikibase
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and Push All Images via Bake
        uses: docker/bake-action@v7.2.0
        with:
          files: docker-bake.hcl
          push: ${{ env.PUSH_IMAGE }}
          load: ${{ env.PUSH_IMAGE == 'false' }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          set: |
            *.cache-from=type=gha,scope=wikibase-shared
            *.cache-to=type=gha,mode=max,scope=wikibase-shared
        env:
          B_TAGS: ${{ steps.meta.outputs.json }}

      - name: Checkout portal-k8s
        if: env.PUSH_IMAGE == 'true'
        uses: actions/checkout@v7
        with:
          repository: MaRDI4NFDI/portal-k8s
          token: ${{ secrets.PORTAL_K8S_PAT }}
          path: portal-k8s

      - name: Update staging values
        if: env.PUSH_IMAGE == 'true' && github.ref == 'refs/heads/main'
        working-directory: portal-k8s
        run: |
          DIGEST=$(docker buildx imagetools inspect ghcr.io/mardi4nfdi/wikibase:latest \
            --format '{{json .Manifest.Digest}}' | tr -d '"')

          yq -i \
            '.spec.values.mediawiki.image.tag = "latest@'"$DIGEST"'"' \
            apps/staging/wikibase/values-staging.yaml

      - name: Update production values
        if: env.PUSH_IMAGE == 'true' && startsWith(github.ref, 'refs/tags/v')
        working-directory: portal-k8s
        run: |
          yq -i \
            '.spec.values.mediawiki.image.tag = "${{ github.ref_name }}"' \
            apps/production/wikibase/values-production.yaml

      - name: Create staging PR
        if: env.PUSH_IMAGE == 'true' && github.ref == 'refs/heads/main'
        id: cpr-staging
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PORTAL_K8S_PAT }}
          path: portal-k8s
          branch: update/wikibase-staging
          delete-branch: true
          title: "Update staging Wikibase image"
          commit-message: "Update staging Wikibase image"
          body: |
            Automated update from `MaRDI4NFDI/docker-wikibase`.

            Environment: staging
            Source commit: `${{ github.sha }}`
            Image: `ghcr.io/mardi4nfdi/wikibase:latest`

      - name: Create production PR
        if: env.PUSH_IMAGE == 'true' && startsWith(github.ref, 'refs/tags/v')
        id: cpr-production
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PORTAL_K8S_PAT }}
          path: portal-k8s
          branch: update/wikibase-production
          delete-branch: true
          title: "Update production Wikibase image to ${{ github.ref_name }}"
          commit-message: "Update production Wikibase image to ${{ github.ref_name }}"
          body: |
            Automated update from `MaRDI4NFDI/docker-wikibase`.

            Environment: production
            Release tag: `${{ github.ref_name }}`
            Source commit: `${{ github.sha }}`
            Image: `ghcr.io/mardi4nfdi/wikibase:${{ github.ref_name }}`

      - name: Add portal-k8s PR links to summary
        if: always()
        run: |
          if [ -n "${{ steps.cpr-staging.outputs.pull-request-url }}" ]; then
            echo "Staging PR: ${{ steps.cpr-staging.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -n "${{ steps.cpr-production.outputs.pull-request-url }}" ]; then
            echo "Production PR: ${{ steps.cpr-production.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
          fi