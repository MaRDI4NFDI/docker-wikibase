name: Build and push images to registry

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Force a rebuild of the Docker images without using cache.'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PUSH_IMAGE: ${{ github.event_name != 'pull_request' }}

jobs:
  build-all:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      # ==========================================
      # 1. WIKIBASE IMAGE
      # ==========================================
      - name: Extract metadata wikibase
        id: meta-wikibase
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/wikibase
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=Mediawiki/Wikibase image for the MaRDI portal
            org.opencontainers.image.title=Wikibase image
          annotations: |
            org.opencontainers.image.description=Mediawiki/Wikibase image for the MaRDI portal
            org.opencontainers.image.title=Wikibase image

      - name: Build and push wikibase image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: ${{ env.PUSH_IMAGE }}
          tags: |
            ${{ steps.meta-wikibase.outputs.tags }}
            local/wikibase:latest
          labels: ${{ steps.meta-wikibase.outputs.labels }}
          annotations: ${{ steps.meta-wikibase.outputs.annotations }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          cache-from: type=gha,scope=wikibase-shared
          cache-to: type=gha,mode=max,scope=wikibase-shared

      # ==========================================
      # 2. APACHE IMAGE
      # ==========================================
      - name: Extract metadata apache
        id: meta-apache
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/apache
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=Apache reverse proxy for Mediawiki/Wikibase
            org.opencontainers.image.title=Apache Proxy
          annotations: |
            org.opencontainers.image.description=Apache reverse proxy for Mediawiki/Wikibase
            org.opencontainers.image.title=Apache Proxy

      - name: Build and push Apache image
        uses: docker/build-push-action@v7.2.0
        with:
          context: apache
          push: ${{ env.PUSH_IMAGE }}
          tags: |
            ${{ steps.meta-apache.outputs.tags }}
            local/apache:latest
          labels: ${{ steps.meta-apache.outputs.labels }}
          annotations: ${{ steps.meta-apache.outputs.annotations }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          cache-from: type=gha,scope=wikibase-shared

      # ==========================================
      # 3. APACHE ASSETS IMAGE
      # ==========================================
      - name: Extract metadata apache-assets
        id: meta-assets
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/apache-assets
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.description=Apache reverse proxy for Mediawiki/Wikibase with static assets
            org.opencontainers.image.title=Apache Proxy (assets)
          annotations: |
            org.opencontainers.image.description=Apache reverse proxy for Mediawiki/Wikibase with static assets
            org.opencontainers.image.title=Apache Proxy (assets)

      - name: Build and push Apache assets image
        uses: docker/build-push-action@v7.2.0
        with:
          context: apache_assets
          push: ${{ env.PUSH_IMAGE }}
          tags: ${{ steps.meta-assets.outputs.tags }}
          labels: ${{ steps.meta-assets.outputs.labels }}
          annotations: ${{ steps.meta-assets.outputs.annotations }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          cache-from: type=gha,scope=wikibase-shared
          build-args: |
            APACHE_IMAGE=${{ env.PUSH_IMAGE == 'true' && fromJSON(steps.meta-apache.outputs.json).tags[0] || 'local/apache:latest' }}
            WB_IMAGE=${{ env.PUSH_IMAGE == 'true' && fromJSON(steps.meta-wikibase.outputs.json).tags[0] || 'local/wikibase:latest' }}

      # ==========================================
      # 4. DEV IMAGE
      # ==========================================
      - name: Extract metadata for dev
        id: meta-dev
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/mardi4nfdi/wikibase-dev
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Wikibase Development
            org.opencontainers.image.description=Wikibase development environment with additional tools
          annotations: |
            org.opencontainers.image.title=Wikibase Development
            org.opencontainers.image.description=Wikibase development environment with additional tools

      - name: Build and push Docker dev image
        uses: docker/build-push-action@v7.2.0
        with:
          context: dev
          push: ${{ env.PUSH_IMAGE }}
          tags: ${{ env.REGISTRY }}/mardi4nfdi/wikibase-dev:latest
          labels: ${{ steps.meta-dev.outputs.labels }}
          annotations: ${{ steps.meta-dev.outputs.annotations }}
          no-cache: ${{ github.event.inputs.no_cache || false }}
          build-args: |
            BASE_IMAGE=${{ env.PUSH_IMAGE == 'true' && fromJSON(steps.meta-wikibase.outputs.json).tags[0] || 'local/wikibase:latest' }}
          cache-from: type=gha,scope=wikibase-shared
